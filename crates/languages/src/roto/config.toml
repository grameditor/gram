name = "Roto"
grammar = "roto"
path_suffixes = ["roto"]
line_comments = ["# ", "// "]
autoclose_before = ";:.,=}])>"
brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = true },
    { start = "(", end = ")", close = true, newline = true },
    { start = "<", end = ">", close = false, newline = true, not_in = ["string", "comment"] },
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["string"] },
]
collapsed_placeholder = " /* ... */ "
tab_size = 4
